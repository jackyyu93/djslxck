<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="30%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FF006E" stop-opacity="0.45"/>
      <stop offset="50%" stop-color="#FF006E" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#FF006E" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#262626" stroke-width="1" opacity="0.6"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#fade)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Magenta accent bar -->
  <rect x="80" y="120" width="6" height="80" fill="#FF006E"/>

  <!-- Eyebrow text -->
  <text x="108" y="160" font-family="Impact, 'Arial Black', sans-serif" font-size="22" font-weight="700" fill="#FF006E" letter-spacing="6">
    OPEN FORMAT · HIGH ENERGY
  </text>
  <text x="108" y="190" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#8A8A8A">
    Beats. Energy. Unforgettable.
  </text>

  <!-- Main wordmark -->
  <text x="80" y="400" font-family="Impact, 'Arial Black', sans-serif" font-size="220" font-weight="900" fill="#F5F5F5" letter-spacing="8">
    DJ <tspan fill="#FF006E">SLXCK</tspan>
  </text>

  <!-- Tagline -->
  <text x="80" y="490" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="500" fill="#F5F5F5">
    Weddings · Private Events · Clubs
  </text>

  <!-- CTA pill -->
  <rect x="80" y="525" width="240" height="56" rx="28" fill="#FF006E"/>
  <text x="200" y="562" font-family="Impact, 'Arial Black', sans-serif" font-size="20" font-weight="700" fill="#0A0A0A" text-anchor="middle" letter-spacing="3">
    BOOK NOW
  </text>

  <!-- Domain -->
  <text x="1120" y="582" font-family="Inter, system-ui, sans-serif" font-size="18" fill="#8A8A8A" text-anchor="end" letter-spacing="2">
    djslxck.com
  </text>

  <!-- Corner accent -->
  <g transform="translate(1080, 80)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="#FF006E" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="20" fill="#FF006E" opacity="0.3"/>
    <circle cx="0" cy="0" r="6" fill="#FF006E"/>
  </g>
</svg>
